    <title>Norns Thailand Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gotu&family=K2D:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        .font-gotu { font-family: 'Gotu', sans-serif; }
        .font-k2d { font-family: 'K2D', sans-serif; }
        
        /* ตั้งค่าโครงสร้างระบบให้รองรับการ Scroll ได้ลื่นไหลเป็นธรรมชาติ */
        html {
            background-color: #29201d;
            margin: 0;
            padding: 0;
            height: 100%;
        }
        
        /* สยบบั๊ก iOS Safari ด้วยการฝังภาพพื้นหลัง bg.png ให้ครอบคลุมยาวเต็มผืนเอกสาร 100% ไร้ขอบตัด */
        body {
            background-image: url('bg.png');
            background-size: cover;
            background-position: center top;
            background-repeat: no-repeat;
            background-attachment: scroll;
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
        }

        .link-card {
            background-color: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
            transition: all 0.2s ease;
        }
        .link-card:hover {
            background-color: rgba(255, 255, 255, 0.25);
            transform: scale(1.01);
        }

        .icon-box {
            width: 48px;
            height: 48px;
            background-color: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6px;
            flex-shrink: 0;
        }
    </style>
</head>
