<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Norns Thailand Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gotu&family=K2D:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        .font-gotu { font-family: 'Gotu', sans-serif; }
        .font-k2d { font-family: 'K2D', sans-serif; }
        
        /* แก้ไขปัญหาแถบสีขาวและล็อกภาพพื้นหลังให้เป๊ะทุกอุปกรณ์ */
        body {
            background-color: #221a17; /* สีน้ำตาลเข้มสำรองคุมโทนเวลาหน้าจอยืดเด้ง */
            margin: 0;
            padding: 0;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -1;
        }

        .link-card {
            background-color: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
            transition: all 0.2s ease;
        }
        .link-card:hover {
            background-color: rgba(255, 255, 255, 0.25);
            transform: scale(1.01);
        }

        .icon-box {
            width: 48px;
            height: 48px;
            background-color: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6px;
            flex-shrink: 0;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center px-4 py-6">

        </div>

    <div class="h-20"></div>

</body>
</html>
